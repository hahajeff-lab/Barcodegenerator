<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業條碼產生器 - 極簡補償版</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; gap: 20px; max-width: 850px; width: 100%; }
        .config-panel { flex: 1; }
        .preview-area { flex: 1; border: 2px dashed #ccc; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; min-height: 300px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-gen { background: #007bff; color: white; }
        .btn-dl { background: #28a745; color: white; display: none; }
        .hint { font-size: 12px; color: #666; margin-top: 4px; line-height: 1.4; }
        #barcode { shape-rendering: crispEdges; }
        #toast { display: none; position: fixed; top: 20px; background: rgba(0,0,0,0.8); color: #fff; padding: 8px 20px; border-radius: 20px; }
        @media (max-width: 600px) { .container { flex-direction: column; } }
    </style>
</head>
<body>

<div id="toast">已更新</div>

<div class="container">
    <div class="config-panel">
        <h2>條碼設定</h2>
        <div class="form-group">
            <label>格式</label>
            <select id="format">
                <option value="CODE128">CODE128</option>
                <option value="EAN13">EAN-13</option>
                <option value="CODE39">CODE39</option>
            </select>
        </div>
        <div class="form-group">
            <label>內容</label>
            <input type="text" id="content" value="12345678">
        </div>
        <div class="form-group">
            <label>基本寬度 (Width)</label>
            <input type="number" id="width" step="0.1" value="1.0">
        </div>
        <div class="form-group">
            <label>黑線縮減量 (BWR)</label>
            <input type="number" id="bwr" step="0.01" value="0.1">
            <div class="hint">建議：0.05-0.2。數值越大，黑線越細。</div>
        </div>
        <button class="btn-gen" onclick="generate()">生成條碼</button>
        <button id="dlBtn" class="btn-dl" onclick="downloadSVG()">下載 SVG</button>
    </div>

    <div class="preview-area">
        <svg id="barcode"></svg>
    </div>
</div>

<script>
    function generate() {
        const format = document.getElementById('format').value;
        const content = document.getElementById('content').value;
        const width = parseFloat(document.getElementById('width').value);
        const bwr = document.getElementById('bwr').value;

        try {
            JsBarcode("#barcode", content, {
                format: format,
                width: width,
                height: 100,
                displayValue: true,
                flat: true,
                valid: function(valid) {
                    if (valid) {
                        // 1. 套用補償：直接對所有矩形加上白色描邊
                        const rects = document.querySelectorAll("#barcode rect");
                        rects.forEach(r => {
                            r.setAttribute("stroke", "#ffffff");
                            r.setAttribute("stroke-width", bwr);
                        });
                        
                        document.getElementById('dlBtn').style.display = 'block';
                        showToast();
                    } else {
                        alert("格式不符！");
                    }
                }
            });
        } catch (e) { alert("生成失敗"); }
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 1000);
    }

    function downloadSVG() {
        // 直接取得包含最新屬性的 SVG 字串
        const svg = document.getElementById("barcode");
        const svgData = new XMLSerializer().serializeToString(svg);
        const blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>' + svgData], {type: "image/svg+xml"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "barcode_bwr.svg";
        a.click();
    }

    window.onload = generate;
</script>
</body>
</html>
