<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業條碼產生器 - 動態補償版</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root { --bwr-gap: 0px; } /* 這裡定義動態補償變數 */

        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { 
            background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: flex; gap: 25px; max-width: 900px; width: 100%; 
        }
        .config-panel { flex: 1; min-width: 320px; }
        .preview-area { 
            flex: 1; border: 2px dashed #ddd; background: #fafafa; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 350px; 
        }

        /* 核心關鍵：這段 CSS 確保黑線被白色侵蝕，且寬度由變數控制 */
        #barcode rect {
            stroke: #ffffff !important;
            stroke-width: var(--bwr-gap) !important;
            paint-order: stroke !important;
            shape-rendering: crispEdges;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* 滑桿樣式 */
        .slider-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; }
        .val-display { font-weight: bold; color: #007bff; min-width: 35px; }

        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-gen { background: #007bff; color: white; }
        .btn-dl { background: #28a745; color: white; display: none; margin-top: 15px; }
        
        .hint { font-size: 12px; color: #777; margin-top: 5px; line-height: 1.4; background: #eef6ff; padding: 8px; border-radius: 4px; }
        
        #toast { 
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 30px; border-radius: 30px; z-index: 1000; 
        }
        @media (max-width: 768px) { .container { flex-direction: column; } }
    </style>
</head>
<body>

<div id="toast">設定已更新</div>

<div class="container">
    <div class="config-panel">
        <h1>條碼參數設定</h1>
        
        <div class="form-group">
            <label>條碼格式</label>
            <select id="format">
                <option value="CODE128">CODE128</option>
                <option value="EAN13">EAN-13</option>
                <option value="CODE39">CODE39</option>
            </select>
        </div>

        <div class="form-group">
            <label>條碼內容</label>
            <input type="text" id="content" value="12345678">
        </div>

        <div class="form-group">
            <label>線條寬度 (Width): <span id="widthVal" class="val-display">1.0</span></label>
            <input type="range" id="width" min="0.5" max="3.0" step="0.1" value="1.0" oninput="syncWidth(this.value)">
        </div>

        <div class="form-group">
            <label>黑線補償縮減 (BWR): <span id="bwrVal" class="val-display">0.10</span></label>
            <div class="slider-container">
                <input type="range" id="bwr" min="0" max="0.5" step="0.01" value="0.10" oninput="updateBWR(this.value)">
            </div>
            <div class="hint">
                滑動滑桿可即時看到黑線變細。這會產生白色描邊來補償印刷擴墨。
            </div>
        </div>

        <button class="btn-gen" onclick="generate()">手動重新生成</button>
        <button id="dlBtn" class="btn-dl" onclick="downloadSVG()">下載專業 SVG 檔</button>
    </div>

    <div class="preview-area">
        <svg id="barcode"></svg>
    </div>
</div>

<script>
    // 即時同步 Width 數值顯示
    function syncWidth(val) {
        document.getElementById('widthVal').innerText = val;
        // 寬度變化較劇烈，建議還是按生成按鈕，或在此直接呼叫 generate()
    }

    // 即時更新補償框 (不需重新生成條碼，僅調整 CSS 變數)
    function updateBWR(val) {
        document.getElementById('bwrVal').innerText = val;
        document.documentElement.style.setProperty('--bwr-gap', val + 'px');
    }

    function generate() {
        const format = document.getElementById('format').value;
        const content = document.getElementById('content').value;
        const width = parseFloat(document.getElementById('width').value);
        
        try {
            JsBarcode("#barcode", content, {
                format: format,
                width: width,
                height: 100,
                displayValue: true,
                flat: true,
                valid: function(valid) {
                    if (valid) {
                        document.getElementById('dlBtn').style.display = 'block';
                        showToast();
                        // 確保生成後立即套用目前的滑桿數值
                        updateBWR(document.getElementById('bwr').value);
                    } else {
                        alert("格式不符！");
                    }
                }
            });
        } catch (e) {
            alert("生成失敗");
        }
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 1000);
    }

    function downloadSVG() {
        const svg = document.getElementById("barcode");
        // 下載前將 CSS 變數實體化為屬性，確保 Illustrator 讀得到
        const bwr = document.getElementById('bwr').value;
        const rects = svg.querySelectorAll("rect");
        rects.forEach(r => {
            r.setAttribute("stroke", "#ffffff");
            r.setAttribute("stroke-width", bwr);
        });

        const svgData = new XMLSerializer().serializeToString(svg);
        const blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>' + svgData], {type: "image/svg+xml"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `barcode_BWR_${bwr}.svg`;
        a.click();
    }

    // 初始生成
    window.onload = function() {
        generate();
        updateBWR(0.10);
    };
</script>

</body>
</html>
