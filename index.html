<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業條碼產生器 - 最終物理補償版</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        /* 基礎樣式 */
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        
        /* 自適應容器：預設 PC 橫向 */
        .container { 
            background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: flex; gap: 25px; max-width: 900px; width: 100%; box-sizing: border-box;
        }

        .config-panel { flex: 1; min-width: 300px; }
        
        .preview-area { 
            flex: 1; border: 2px dashed #ddd; background: #fafafa; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; 
        }

        /* 手機自適應：寬度小於 768px 時變垂直 */
        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 15px; }
            .config-panel { min-width: 100%; }
            .preview-area { min-height: 200px; margin-top: 10px; }
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-gen { background: #007bff; color: white; }
        .btn-gen:hover { background: #0056b3; }
        .btn-dl { background: #28a745; color: white; display: none; }
        
        .hint { font-size: 12px; color: #666; margin-top: 5px; border-left: 3px solid #28a745; padding-left: 8px; line-height: 1.4; }
        
        #barcode { max-width: 100%; height: auto; background: transparent; shape-rendering: crispEdges; }

        /* 提示框 Toast */
        #toast { 
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 10px 30px; border-radius: 50px; z-index: 1000; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="toast">條碼已更新</div>

<div class="container">
    <div class="config-panel">
        <h1>條碼設定</h1>
        <div class="form-group">
            <label>格式</label>
            <select id="format">
                <option value="CODE128">CODE128</option>
                <option value="EAN13">EAN-13 (13位數字)</option>
                <option value="CODE39">CODE39</option>
            </select>
        </div>
        <div class="form-group">
            <label>內容</label>
            <input type="text" id="content" value="12345678">
        </div>
        <div class="form-group">
            <label>黑線物理縮減 (BWR)</label>
            <input type="number" id="bwr" step="0.01" value="0.10">
            <div class="hint">物理縮減：直接調整路徑寬度，不產生白邊。適合任何底色稿件。</div>
        </div>
        <button class="btn-gen" onclick="generate()">生成條碼</button>
        <button id="dlBtn" class="btn-dl" onclick="downloadSVG()">下載透明背景 SVG</button>
    </div>

    <div class="preview-area">
        <div style="font-size: 12px; color: #999; margin-bottom: 10px;">SVG 預覽 (透明背景)</div>
        <svg id="barcode"></svg>
    </div>
</div>

<script>
    function generate() {
        const format = document.getElementById('format').value;
        const content = document.getElementById('content').value;
        const bwr = parseFloat(document.getElementById('bwr').value) || 0;

        try {
            JsBarcode("#barcode", content, {
                format: format,
                width: 2, // 基礎比例
                height: 100,
                displayValue: true,
                background: "rgba(0,0,0,0)", // 強制背景透明
                valid: function(valid) {
                    if (valid) {
                        // 執行物理寬度縮減
                        applyPhysicalBWR(bwr);
                        
                        // 顯示下載按鈕與提示
                        document.getElementById('dlBtn').style.display = 'block';
                        showToast("條碼生成成功");
                    } else {
                        alert("格式或內容錯誤！");
                    }
                }
            });
        } catch (e) {
            alert("生成失敗，請檢查輸入內容");
        }
    }

    function applyPhysicalBWR(reduction) {
        const svg = document.getElementById("barcode");
        const rects = svg.querySelectorAll("rect");
        
        rects.forEach(rect => {
            const fill = rect.getAttribute("fill");
            // 找出所有黑色長條 (排除透明底與白色塊)
            if (fill && fill !== "none" && fill !== "rgba(0,0,0,0)" && fill !== "#ffffff") {
                const originalWidth = parseFloat(rect.getAttribute("width"));
                const originalX = parseFloat(rect.getAttribute("x"));

                // 物理縮減：減少寬度，並位移 X 軸使縮減量均分在左右兩側
                const newWidth = originalWidth - reduction;
                const newX = originalX + (reduction / 2);

                if (newWidth > 0) {
                    rect.setAttribute("width", newWidth);
                    rect.setAttribute("x", newX);
                }
            }
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 1500);
    }

function downloadSVG() {
    const svg = document.getElementById("barcode");
    
    // 取得當前的條碼內容與 BWR 數值
    const contentValue = document.getElementById('content').value;
    const bwrValue = document.getElementById('bwr').value;
    
    // 組合檔名：barcode_內容_BWR_數值.svg
    const fileName = `barcode_${contentValue}_BWR_${bwrValue}.svg`;

    const svgData = new XMLSerializer().serializeToString(svg);
    // 加入 XML 標頭以利 Illustrator 正確開啟
    const blob = new Blob(['<?xml version="1.0" encoding="UTF-8" standalone="no"?>' + svgData], {type: "image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement("a");
    a.href = url;
    a.download = fileName; // 套用新的檔名格式
    a.click();
    
    // 釋放記憶體
    URL.revokeObjectURL(url);
}


    window.onload = generate;
</script>
</body>
</html>
